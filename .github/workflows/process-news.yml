name: Process News Relevance Analysis

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows triggering manually from GitHub Action tab

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Process News Endpoint
        run: |
          APP_URL="${{ secrets.APP_URL }}"
          if [ -z "$APP_URL" ]; then
            APP_URL="https://finsage-plum.vercel.app"
          fi
          CRON_SECRET="${{ secrets.CRON_SECRET }}"
          if [ -z "$CRON_SECRET" ]; then
            CRON_SECRET="pp-cron-2026-secret"
          fi
          curl -X GET "$APP_URL/api/cron/process-news" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -f

